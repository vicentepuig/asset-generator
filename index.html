<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relvo Assets Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #E8E8E8;
      --surface: #FFFFFF;
      --surface2: #F0F0F0;
      --border: #D0D0D0;
      --accent: #13131E;
      --accent2: #3F28B2;
      --text: #13131E;
      --muted: #909090;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px; font-weight: 500; letter-spacing: -0.02em;
      color: var(--text);
    }
    .header-brand {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: 11px; font-weight: 500;
    }
    .header-brand svg { height: 16px; width: auto; display: block; }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .section-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }

    /* ── SLOTS ── */
    .slots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .slot.has-shape { border-color: var(--border); }
    .slot.slot-outer.has-shape { border-color: rgba(99,102,241,0.4); }

    .slot-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    .slot-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: 5px;
    }
    .slot-tag.outer { background: rgba(63,40,178,0.1); color: var(--accent2); border: 1px solid rgba(63,40,178,0.2); }
    .slot-tag.inner { background: rgba(0,0,0,0.06); color: #666; border: 1px solid rgba(0,0,0,0.1); }

    .slot-pct { font-size: 10px; color: var(--muted); }

    .slot-body {
      height: 90px;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
      position: relative;
    }

    .slot-empty {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; color: var(--muted);
    }
    .slot-empty svg { opacity: 0.4; }
    .slot-empty span { font-size: 10px; }

    .slot-preview { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .slot-preview svg { max-width: 100%; max-height: 70px; }

    .slot-footer {
      padding: 6px 10px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      min-height: 28px;
    }
    .slot-name { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
    .btn-clear {
      background: none; border: none; cursor: pointer;
      font-size: 10px; color: var(--muted); padding: 1px 4px; border-radius: 3px;
    }
    .btn-clear:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* ── RANDOMIZE ── */
    .btn-random {
      width: 100%; padding: 9px; border-radius: 8px;
      background: var(--accent); border: 1px solid var(--accent);
      color: #fff; font-size: 12px; font-weight: 600;
      font-family: 'Instrument Sans', sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 7px; transition: all 0.15s;
    }
    .btn-random:hover { background: var(--accent2); border-color: var(--accent2); }
    .btn-random:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-random svg { transition: transform 0.3s; }
    .btn-random:hover svg { transform: rotate(180deg); }

    /* ── LIBRARY ── */
    .library-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }

    .btn-add-shapes {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 10px; font-weight: 600;
      padding: 3px 8px; border-radius: 5px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: all 0.1s;
    }
    .btn-add-shapes:hover { color: var(--text); border-color: var(--accent2); }

    #library-file-input { display: none; }

    .library-empty {
      border: 1px dashed var(--border); border-radius: var(--radius);
      padding: 24px 12px; text-align: center;
      color: var(--muted); font-size: 12px;
      cursor: pointer; transition: background 0.15s;
    }
    .library-empty:hover { background: var(--surface2); }

    .library-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .shape-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      cursor: pointer; position: relative;
      transition: border-color 0.15s;
    }
    .shape-card:hover { border-color: var(--accent2); }
    .shape-card.selected-outer { border-color: var(--accent2) !important; box-shadow: 0 0 0 1px var(--accent2); }
    .shape-card.selected-inner { border-color: #888 !important; box-shadow: 0 0 0 1px #888; }

    .shape-thumb {
      height: 64px; display: flex; align-items: center; justify-content: center;
      padding: 6px; background: var(--bg);
    }
    .shape-thumb svg { max-width: 100%; max-height: 52px; }

    .shape-actions {
      display: none;
      position: absolute; inset: 0;
      background: rgba(232,232,232,0.92);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 6px;
    }
    .shape-card:hover .shape-actions { display: flex; }

    .action-btn {
      width: 100%; padding: 5px 4px; border-radius: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
      border: none; cursor: pointer; transition: all 0.1s;
    }
    .action-btn.set-outer {
      background: rgba(63,40,178,0.12); color: var(--accent2);
      border: 1px solid rgba(63,40,178,0.25);
    }
    .action-btn.set-outer:hover { background: rgba(63,40,178,0.22); }
    .action-btn.set-inner {
      background: rgba(0,0,0,0.06); color: #555;
      border: 1px solid rgba(0,0,0,0.12);
    }
    .action-btn.set-inner:hover { background: rgba(0,0,0,0.12); }

    .shape-label {
      padding: 4px 6px; font-size: 9px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-top: 1px solid var(--border); text-align: center;
    }

    .shape-badges {
      position: absolute; top: 4px; left: 4px;
      display: flex; gap: 3px;
    }
    .badge {
      font-size: 8px; font-weight: 800; letter-spacing: 0.05em;
      padding: 1px 5px; border-radius: 3px; line-height: 1.5;
    }
    .badge-outer { background: var(--accent2); color: white; }
    .badge-inner { background: #888; color: white; }

    /* ── CONTROLS ── */
    .control-row {
      display: flex; align-items: center; gap: 8px;
    }
    .control-row label { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 40px; }
    input[type="range"] {
      -webkit-appearance: none; flex: 1; height: 3px;
      background: var(--border); border-radius: 4px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .value-badge {
      font-family: 'Geist Mono', monospace;
      font-size: 11px; font-weight: 600; color: var(--accent2);
      min-width: 34px; text-align: right;
    }

    /* ── COLOR PICKERS ── */
    .color-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .color-slot {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .color-slot-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted);
    }
    .color-slot-label.outer { color: var(--accent2); }
    .color-row { display: flex; align-items: center; gap: 6px; }
    input[type="color"].slot-color {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); padding: 2px;
      cursor: pointer; background: none; flex-shrink: 0;
    }
    .color-hex {
      font-size: 11px; color: var(--text); font-family: 'Geist Mono', monospace;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 5px; width: 100%;
      outline: none; text-transform: uppercase;
    }
    .color-hex:focus { border-color: var(--accent); }

    /* ── PRESET PALETTE ── */
    .preset-palette { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .preset-swatch {
      width: 20px; height: 20px; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .preset-swatch:hover { transform: scale(1.2); }
    .preset-swatch.active { border-color: var(--accent2); }

    /* ── BG ── */
    .bg-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .bg-swatch {
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.15s;
    }
    .bg-swatch.active { border-color: var(--accent2); }
    .bg-swatch.checker {
      background: repeating-conic-gradient(#bbb 0% 25%, #e8e8e8 0% 50%) 0 0 / 10px 10px;
    }
    input[type="color"].swatch-color {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border); padding: 0;
      cursor: pointer; background: none; overflow: hidden;
    }

    /* ── SIZE ── */
    .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .size-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: 7px; border-radius: 7px;
      cursor: pointer; font-size: 10px; font-weight: 600;
      font-family: 'Geist Mono', monospace;
      transition: all 0.1s; text-align: center;
    }
    .size-btn:hover { border-color: var(--accent); color: var(--text); }
    .size-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(63,40,178,0.06); }

    .custom-size {
      display: flex; gap: 5px; align-items: center; margin-top: 6px;
    }
    .custom-size input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 5px 7px; border-radius: 6px;
      font-size: 11px; width: 64px; outline: none;
    }
    .custom-size input:focus { border-color: var(--accent); }
    .custom-size span { color: var(--muted); font-size: 11px; }

    /* ── EXPORT ── */
    .export-row { display: flex; gap: 7px; }
    .btn {
      flex: 1; padding: 9px; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: none; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: white; font-family: 'Instrument Sans', sans-serif; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
      font-family: 'Instrument Sans', sans-serif;
    }
    .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── CANVAS ── */
    .canvas-area { display: flex; flex-direction: column; overflow: hidden; }

    .canvas-toolbar {
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-dot.ready { background: #34d399; }
    .status-dot.partial { background: #fbbf24; }
    .status-text { font-size: 11px; color: var(--muted); }

    .zoom-controls { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .zoom-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); width: 26px; height: 26px; border-radius: 5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.1s;
    }
    .zoom-btn:hover { border-color: var(--accent); color: var(--text); }
    .zoom-label { font-size: 11px; color: var(--muted); min-width: 38px; text-align: center; }

    .canvas-viewport {
      flex: 1; overflow: auto;
      display: flex; align-items: center; justify-content: center;
      padding: 40px;
      background: #D4D4D4;
    }

    .canvas-frame {
      position: relative;
      box-shadow: 0 0 0 1px var(--border), 0 12px 40px rgba(0,0,0,0.18);
      border-radius: 2px;
      flex-shrink: 0;
    }

    #composite-svg { display: block; }

    .empty-state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; pointer-events: none;
    }
    .empty-ring {
      width: 56px; height: 56px; border-radius: 50%;
      border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--border);
    }
    .empty-state p { font-size: 12px; color: var(--muted); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>Relvo Assets Generator</h1>
  <div class="header-brand">
    <span>Desarrollado por</span>

</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-scroll">

      <!-- ACTIVE SLOTS -->
      <div>
        <div class="section-label">Composition</div>
        <div class="slots">
          <div class="slot slot-outer" id="slot-outer">
            <div class="slot-header">
              <span class="slot-tag outer">Outer</span>
              <span class="slot-pct">100%</span>
            </div>
            <div class="slot-body">
              <div class="slot-empty" id="slot-outer-empty">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
                <span>No shape</span>
              </div>
              <div class="slot-preview" id="slot-outer-preview" style="display:none"></div>
            </div>
            <div class="slot-footer">
              <span class="slot-name" id="slot-outer-name">—</span>
              <button class="btn-clear" id="slot-outer-clear" onclick="clearSlot('outer')" style="display:none">✕</button>
            </div>
          </div>

          <div class="slot slot-inner" id="slot-inner">
            <div class="slot-header">
              <span class="slot-tag inner">Inner</span>
              <span class="slot-pct" id="inner-pct-label">67%</span>
            </div>
            <div class="slot-body">
              <div class="slot-empty" id="slot-inner-empty">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
                <span>No shape</span>
              </div>
              <div class="slot-preview" id="slot-inner-preview" style="display:none"></div>
            </div>
            <div class="slot-footer">
              <span class="slot-name" id="slot-inner-name">—</span>
              <button class="btn-clear" id="slot-inner-clear" onclick="clearSlot('inner')" style="display:none">✕</button>
            </div>
          </div>
        </div>

        <!-- RANDOMIZE -->
        <button class="btn-random" id="btn-random" onclick="randomize()" disabled style="margin-top:10px">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22M18 2l4 4-4 4M18 14l4 4-4 4"/>
          </svg>
          Randomize
        </button>
      </div>

      <!-- SHAPE LIBRARY -->
      <div>
        <div class="library-header">
          <div class="section-label" style="margin:0">Shape Library</div>
          <button class="btn-add-shapes" onclick="document.getElementById('library-file-input').click()">
            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Add SVGs
          </button>
          <input type="file" id="library-file-input" accept=".svg,image/svg+xml" multiple />
        </div>

        <div class="library-empty" id="library-empty" onclick="document.getElementById('library-file-input').click()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 6px;display:block;opacity:0.4"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Drop SVG files here or click to browse
        </div>

        <div class="library-grid" id="library-grid" style="display:none"></div>
      </div>

      <!-- STROKE -->
      <div>
        <div class="section-label">Outline</div>
        <div class="control-row">
          <label>Width</label>
          <input type="range" id="stroke-slider" min="0.5" max="8" value="1" step="0.5" oninput="onStrokeChange(this.value)" />
          <span class="value-badge" id="stroke-value">1px</span>
        </div>
      </div>

      <!-- COLORS -->
      <div>
        <div class="section-label">Shape Colors</div>
        <div class="color-pair">
          <div class="color-slot">
            <span class="color-slot-label outer">Outer</span>
            <div class="color-row">
              <input type="color" class="slot-color" id="color-outer" value="#ffffff" oninput="onColorChange('outer', this.value)" />
              <input type="text" class="color-hex" id="hex-outer" value="#FFFFFF" maxlength="7"
                oninput="onHexInput('outer', this.value)"
                onblur="syncHexDisplay('outer')" />
            </div>
            <div class="preset-palette" id="palette-outer"></div>
          </div>
          <div class="color-slot">
            <span class="color-slot-label">Inner</span>
            <div class="color-row">
              <input type="color" class="slot-color" id="color-inner" value="#ffffff" oninput="onColorChange('inner', this.value)" />
              <input type="text" class="color-hex" id="hex-inner" value="#FFFFFF" maxlength="7"
                oninput="onHexInput('inner', this.value)"
                onblur="syncHexDisplay('inner')" />
            </div>
            <div class="preset-palette" id="palette-inner"></div>
          </div>
        </div>
      </div>

      <!-- BACKGROUND -->
      <div>
        <div class="section-label">Background</div>
        <div class="bg-row">
          <div class="bg-swatch active" style="background:#0d0d14" data-color="#0d0d14" onclick="setBg(this)"></div>
          <div class="bg-swatch" style="background:#ffffff" data-color="#ffffff" onclick="setBg(this)"></div>
          <div class="bg-swatch" style="background:#f5f0eb" data-color="#f5f0eb" onclick="setBg(this)"></div>
          <div class="bg-swatch" style="background:#1e1b4b" data-color="#1e1b4b" onclick="setBg(this)"></div>
          <div class="bg-swatch checker" data-color="transparent" onclick="setBg(this)"></div>
          <input type="color" class="swatch-color" id="custom-bg" value="#0d0d14" oninput="setCustomBg(this.value)" title="Custom" />
        </div>
      </div>

      <!-- CANVAS SIZE -->
      <div>
        <div class="section-label">Canvas Size</div>
        <div class="size-grid">
          <button class="size-btn active" onclick="setSize(800,800,this)">800 × 800</button>
          <button class="size-btn" onclick="setSize(1080,1080,this)">1080 × 1080</button>
          <button class="size-btn" onclick="setSize(1200,630,this)">1200 × 630</button>
          <button class="size-btn" onclick="setSize(2000,2000,this)">2000 × 2000</button>
        </div>
        <div class="custom-size">
          <input type="number" id="custom-w" placeholder="W" min="100" max="4000" />
          <span>×</span>
          <input type="number" id="custom-h" placeholder="H" min="100" max="4000" />
          <button class="btn-secondary" style="flex:0;padding:5px 9px;font-size:10px;" onclick="applyCustomSize()">Apply</button>
        </div>
      </div>

      <!-- EXPORT -->
      <div>
        <div class="section-label">Export</div>
        <div class="export-row">
          <button class="btn btn-secondary" id="btn-svg" onclick="exportSVG()" disabled>
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            SVG
          </button>
          <button class="btn btn-primary" id="btn-png" onclick="exportPNG()" disabled>
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            PNG
          </button>
        </div>
      </div>

    </div>
  </aside>

  <!-- CANVAS -->
  <main class="canvas-area">
    <div class="canvas-toolbar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Add shapes to the library</span>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoom(-0.1)">−</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button class="zoom-btn" onclick="zoom(0.1)">+</button>
        <button class="zoom-btn" onclick="resetZoom()" title="Fit to view">⊡</button>
      </div>
    </div>

    <div class="canvas-viewport" id="canvas-viewport">
      <div class="canvas-frame" id="canvas-frame" style="width:800px;height:800px;background:#0d0d14;">
        <div class="empty-state" id="empty-state">
          <div class="empty-ring">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="10" stroke-dasharray="3 3"/></svg>
          </div>
          <p>Assign outer & inner shapes</p>
        </div>
        <svg id="composite-svg" width="800" height="800"
          xmlns="http://www.w3.org/2000/svg"
          style="position:absolute;top:0;left:0;"></svg>
      </div>
    </div>
  </main>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────
  const library = [];   // [{ id, filename, svgText, viewBox }]
  let nextId = 0;

  const slots = { outer: null, inner: null };  // shape id or null

  const config = {
    scale: 0.67, // fixed: inner is always 33% smaller than outer
    bgColor: '#0d0d14',
    canvasW: 800,
    canvasH: 800,
    zoom: 1,
    strokeWidth: 1,
  };

  const slotColors = { outer: '#ffffff', inner: '#ffffff' };

  // ── File input ─────────────────────────────────────────────────
  document.getElementById('library-file-input').addEventListener('change', e => {
    Array.from(e.target.files).forEach(f => loadFile(f));
    e.target.value = '';
  });

  // Drag onto library empty
  const libEmpty = document.getElementById('library-empty');
  libEmpty.addEventListener('dragover', e => { e.preventDefault(); libEmpty.style.background = 'var(--surface2)'; });
  libEmpty.addEventListener('dragleave', () => { libEmpty.style.background = ''; });
  libEmpty.addEventListener('drop', e => {
    e.preventDefault(); libEmpty.style.background = '';
    Array.from(e.dataTransfer.files)
      .filter(f => f.type === 'image/svg+xml' || f.name.endsWith('.svg'))
      .forEach(f => loadFile(f));
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const svgText = sanitizeSVG(e.target.result);
      const viewBox = extractViewBox(svgText);
      const shape = { id: nextId++, filename: file.name, svgText, viewBox };
      library.push(shape);
      renderLibrary();
      updateRandomBtn();
    };
    reader.readAsText(file);
  }

  // ── Sanitize ───────────────────────────────────────────────────
  function sanitizeSVG(svgText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    doc.querySelectorAll('script').forEach(n => n.remove());
    doc.querySelectorAll('[onclick],[onload],[onerror],[onmouseover]').forEach(n => {
      ['onclick','onload','onerror','onmouseover'].forEach(a => n.removeAttribute(a));
    });
    return new XMLSerializer().serializeToString(doc.documentElement);
  }

  function extractViewBox(svgText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    if (!svg) return { x:0, y:0, w:100, h:100 };
    const vb = svg.getAttribute('viewBox');
    if (vb) {
      const p = vb.trim().split(/[\s,]+/).map(Number);
      return { x:p[0], y:p[1], w:p[2], h:p[3] };
    }
    return { x:0, y:0, w: parseFloat(svg.getAttribute('width'))||100, h: parseFloat(svg.getAttribute('height'))||100 };
  }

  // ── Library rendering ──────────────────────────────────────────
  function renderLibrary() {
    const grid = document.getElementById('library-grid');
    const empty = document.getElementById('library-empty');

    if (library.length === 0) {
      empty.style.display = '';
      grid.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    grid.style.display = 'grid';
    grid.innerHTML = '';

    library.forEach(shape => {
      const isOuter = slots.outer === shape.id;
      const isInner = slots.inner === shape.id;

      const card = document.createElement('div');
      card.className = 'shape-card' +
        (isOuter ? ' selected-outer' : '') +
        (isInner ? ' selected-inner' : '');
      card.dataset.id = shape.id;

      // Thumb
      const thumb = document.createElement('div');
      thumb.className = 'shape-thumb';
      const tmpSvg = svgForThumb(shape.svgText);
      thumb.appendChild(tmpSvg);

      // Badges
      const badges = document.createElement('div');
      badges.className = 'shape-badges';
      if (isOuter) { const b = document.createElement('span'); b.className='badge badge-outer'; b.textContent='OUT'; badges.appendChild(b); }
      if (isInner) { const b = document.createElement('span'); b.className='badge badge-inner'; b.textContent='IN'; badges.appendChild(b); }

      // Actions overlay
      const actions = document.createElement('div');
      actions.className = 'shape-actions';

      const btnOuter = document.createElement('button');
      btnOuter.className = 'action-btn set-outer';
      btnOuter.textContent = isOuter ? '✓ Outer' : 'Set Outer';
      btnOuter.onclick = (e) => { e.stopPropagation(); setSlot('outer', shape.id); };

      const btnInner = document.createElement('button');
      btnInner.className = 'action-btn set-inner';
      btnInner.textContent = isInner ? '✓ Inner' : 'Set Inner';
      btnInner.onclick = (e) => { e.stopPropagation(); setSlot('inner', shape.id); };

      const btnDel = document.createElement('button');
      btnDel.className = 'action-btn';
      btnDel.style.cssText = 'background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.2);margin-top:2px;';
      btnDel.textContent = 'Remove';
      btnDel.onclick = (e) => { e.stopPropagation(); removeShape(shape.id); };

      actions.append(btnOuter, btnInner, btnDel);

      // Label
      const label = document.createElement('div');
      label.className = 'shape-label';
      label.textContent = shape.filename.replace(/\.svg$/i, '');

      card.append(thumb, badges, actions, label);
      grid.appendChild(card);
    });
  }

  function svgForThumb(svgText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    if (!svg) { const d = document.createElement('div'); return d; }
    const clone = svg.cloneNode(true);
    clone.setAttribute('width', '100%');
    clone.setAttribute('height', '100%');
    clone.style.maxHeight = '52px';
    // import into document
    return document.adoptNode(clone);
  }

  // ── Stroke color extraction ─────────────────────────────────────
  function extractStrokeColor(svgText) {
    const m = svgText.match(/stroke\s*:\s*(#[0-9a-fA-F]{3,8})/);
    return m ? m[1].toUpperCase() : '#FFFFFF';
  }

  function setColorUI(slot, hex) {
    const h = hex.toUpperCase();
    document.getElementById(`color-${slot}`).value = h;
    document.getElementById(`hex-${slot}`).value = h;
    document.querySelectorAll(`#palette-${slot} .preset-swatch`).forEach(sw => {
      sw.classList.toggle('active', sw.dataset.color.toUpperCase() === h);
    });
  }

  // ── Slot management ────────────────────────────────────────────
  function setSlot(slot, shapeId) {
    // If this shape is already in the OTHER slot, swap
    const other = slot === 'outer' ? 'inner' : 'outer';
    if (slots[other] === shapeId) {
      slots[other] = slots[slot];
      // keep other slot's color unchanged (user may have customised it)
    }
    slots[slot] = shapeId;

    // Seed color picker with the shape's original stroke color
    const shape = library.find(s => s.id === shapeId);
    if (shape) {
      const orig = extractStrokeColor(shape.svgText);
      slotColors[slot] = orig;
      setColorUI(slot, orig);
    }

    renderLibrary();
    updateSlotUI(slot);
    updateSlotUI(other);
    renderComposite();
    updateStatus();
    updateExportButtons();
  }

  function clearSlot(slot) {
    slots[slot] = null;
    renderLibrary();
    updateSlotUI(slot);
    renderComposite();
    updateStatus();
    updateExportButtons();
  }

  function removeShape(id) {
    const idx = library.findIndex(s => s.id === id);
    if (idx !== -1) library.splice(idx, 1);
    if (slots.outer === id) { slots.outer = null; updateSlotUI('outer'); }
    if (slots.inner === id) { slots.inner = null; updateSlotUI('inner'); }
    renderLibrary();
    renderComposite();
    updateStatus();
    updateExportButtons();
    updateRandomBtn();
  }

  function updateSlotUI(slot) {
    const shape = library.find(s => s.id === slots[slot]);
    const preview = document.getElementById(`slot-${slot}-preview`);
    const empty = document.getElementById(`slot-${slot}-empty`);
    const nameEl = document.getElementById(`slot-${slot}-name`);
    const clearBtn = document.getElementById(`slot-${slot}-clear`);
    const slotEl = document.getElementById(`slot-${slot}`);

    if (shape) {
      empty.style.display = 'none';
      preview.style.display = 'flex';
      preview.innerHTML = '';
      const thumb = svgForThumb(shape.svgText);
      preview.appendChild(thumb);
      nameEl.textContent = shape.filename.replace(/\.svg$/i,'');
      clearBtn.style.display = '';
      slotEl.classList.add('has-shape');
    } else {
      empty.style.display = '';
      preview.style.display = 'none';
      nameEl.textContent = '—';
      clearBtn.style.display = 'none';
      slotEl.classList.remove('has-shape');
    }
  }

  // ── Randomize ──────────────────────────────────────────────────
  function randomize() {
    if (library.length === 0) return;
    if (library.length === 1) {
      slots.outer = library[0].id;
      slots.inner = library[0].id;
    } else {
      const shuffled = [...library].sort(() => Math.random() - 0.5);
      slots.outer = shuffled[0].id;
      slots.inner = shuffled[1].id;
    }
    renderLibrary();
    updateSlotUI('outer');
    updateSlotUI('inner');
    renderComposite();
    updateStatus();
    updateExportButtons();
  }

  function updateRandomBtn() {
    document.getElementById('btn-random').disabled = library.length < 1;
  }

  // ── Composite render ───────────────────────────────────────────
  function renderComposite() {
    const svg = document.getElementById('composite-svg');
    const empty = document.getElementById('empty-state');
    const W = config.canvasW;
    const H = config.canvasH;

    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    const hasOuter = slots.outer !== null;
    const hasInner = slots.inner !== null;
    empty.style.display = (hasOuter || hasInner) ? 'none' : '';
    if (!hasOuter && !hasInner) return;

    // Background
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('width', W); bg.setAttribute('height', H);
    bg.setAttribute('fill', config.bgColor === 'transparent' ? 'none' : config.bgColor);
    svg.appendChild(bg);

    const cx = W / 2, cy = H / 2;
    const baseSize = Math.min(W, H) * 0.9;

    if (hasOuter) {
      const shape = library.find(s => s.id === slots.outer);
      if (shape) appendShape(svg, shape, cx, cy, baseSize, slotColors.outer, config.strokeWidth);
    }
    if (hasInner) {
      const shape = library.find(s => s.id === slots.inner);
      if (shape) appendShape(svg, shape, cx, cy, baseSize * config.scale, slotColors.inner, config.strokeWidth);
    }
  }

  function appendShape(svg, shape, cx, cy, size, strokeColor, strokeWidth) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(shape.svgText, 'image/svg+xml');
    const sourceSVG = doc.querySelector('svg');
    if (!sourceSVG) return;
    sourceSVG.querySelectorAll('script').forEach(n => n.remove());

    const vb = shape.viewBox;
    const scale = Math.min(size / vb.w, size / vb.h);
    const scaledW = vb.w * scale;
    const scaledH = vb.h * scale;
    const tx = cx - scaledW / 2 - vb.x * scale;
    const ty = cy - scaledH / 2 - vb.y * scale;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);

    Array.from(sourceSVG.childNodes).forEach(child => {
      try { g.appendChild(svg.ownerDocument.importNode(child, true)); } catch(e){}
    });

    // Override stroke color and width on every drawn element.
    // vector-effect="non-scaling-stroke" keeps px width independent of the scale transform.
    // Remove <style> blocks FIRST so their CSS doesn't override our inline styles
    g.querySelectorAll('style').forEach(s => { s.remove(); });
    g.querySelectorAll('path,circle,ellipse,rect,line,polyline,polygon').forEach(el => {
      el.setAttribute('vector-effect', 'non-scaling-stroke');
      // Use inline style (highest specificity) to override any CSS class rules in the source SVG
      el.style.stroke = strokeColor;
      el.style.strokeWidth = strokeWidth + 'px';
    });

    svg.appendChild(g);
  }

  // ── Controls ───────────────────────────────────────────────────

  function onStrokeChange(val) {
    config.strokeWidth = parseFloat(val);
    document.getElementById('stroke-value').textContent = `${val}px`;
    renderComposite();
  }

  const PRESET_COLORS = [
    '#13131E','#186666','#B8D12A','#AA5639','#3F28B2','#72DDAA','#D0FF0B',
    '#FF9566','#633BF2','#E8E8E8','#ABABB7','#DFF4EB','#D5F7C1','#E3C0F2'
  ];

  function buildPalettes() {
    ['outer','inner'].forEach(slot => {
      const container = document.getElementById(`palette-${slot}`);
      PRESET_COLORS.forEach(color => {
        const sw = document.createElement('div');
        sw.className = 'preset-swatch';
        sw.style.background = color;
        sw.title = color;
        sw.dataset.color = color;
        sw.onclick = () => setPresetColor(slot, color);
        container.appendChild(sw);
      });
    });
  }

  function setPresetColor(slot, hex) {
    slotColors[slot] = hex;
    document.getElementById(`color-${slot}`).value = hex;
    document.getElementById(`hex-${slot}`).value = hex.toUpperCase();
    document.querySelectorAll(`#palette-${slot} .preset-swatch`).forEach(sw => {
      sw.classList.toggle('active', sw.dataset.color.toUpperCase() === hex.toUpperCase());
    });
    renderComposite();
  }

  function onColorChange(slot, hex) {
    slotColors[slot] = hex;
    document.getElementById(`hex-${slot}`).value = hex.toUpperCase();
    document.querySelectorAll(`#palette-${slot} .preset-swatch`).forEach(sw => {
      sw.classList.toggle('active', sw.dataset.color.toUpperCase() === hex.toUpperCase());
    });
    renderComposite();
  }

  function onHexInput(slot, val) {
    const hex = val.startsWith('#') ? val : '#' + val;
    if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
      slotColors[slot] = hex;
      document.getElementById(`color-${slot}`).value = hex;
      renderComposite();
    }
  }

  function syncHexDisplay(slot) {
    document.getElementById(`hex-${slot}`).value = slotColors[slot].toUpperCase();
  }

  function setBg(el) {
    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    config.bgColor = el.dataset.color;
    const frame = document.getElementById('canvas-frame');
    frame.style.background = config.bgColor === 'transparent'
      ? 'repeating-conic-gradient(#3a3a50 0% 25%, #1a1a28 0% 50%) 0 0 / 20px 20px'
      : config.bgColor;
    renderComposite();
  }

  function setCustomBg(val) {
    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
    config.bgColor = val;
    document.getElementById('canvas-frame').style.background = val;
    renderComposite();
  }

  function setSize(w, h, btn) {
    config.canvasW = w; config.canvasH = h;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    applyCanvasSize();
  }

  function applyCustomSize() {
    const w = parseInt(document.getElementById('custom-w').value);
    const h = parseInt(document.getElementById('custom-h').value);
    if (w >= 100 && h >= 100) {
      config.canvasW = w; config.canvasH = h;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      applyCanvasSize();
    }
  }

  function applyCanvasSize() {
    const frame = document.getElementById('canvas-frame');
    frame.style.width = `${config.canvasW}px`;
    frame.style.height = `${config.canvasH}px`;
    const svg = document.getElementById('composite-svg');
    svg.style.width = `${config.canvasW}px`;
    svg.style.height = `${config.canvasH}px`;
    renderComposite();
    setTimeout(resetZoom, 50);
  }

  // ── Zoom ───────────────────────────────────────────────────────
  function zoom(delta) {
    config.zoom = Math.max(0.1, Math.min(4, config.zoom + delta));
    applyZoom();
  }

  function resetZoom() {
    const viewport = document.getElementById('canvas-viewport');
    const vw = viewport.clientWidth - 80;
    const vh = viewport.clientHeight - 80;
    config.zoom = Math.min(vw / config.canvasW, vh / config.canvasH, 1);
    applyZoom();
  }

  function applyZoom() {
    const frame = document.getElementById('canvas-frame');
    frame.style.transform = `scale(${config.zoom})`;
    frame.style.transformOrigin = 'center center';
    document.getElementById('zoom-label').textContent = `${Math.round(config.zoom * 100)}%`;
  }

  // ── Status ─────────────────────────────────────────────────────
  function updateStatus() {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (slots.outer !== null && slots.inner !== null) {
      dot.className = 'status-dot ready'; text.textContent = 'Composite ready';
    } else if (slots.outer !== null || slots.inner !== null) {
      dot.className = 'status-dot partial'; text.textContent = slots.outer ? 'Set inner shape' : 'Set outer shape';
    } else if (library.length > 0) {
      dot.className = 'status-dot'; dot.style.background = ''; text.textContent = 'Assign shapes to slots';
    } else {
      dot.className = 'status-dot'; dot.style.background = ''; text.textContent = 'Add shapes to the library';
    }
  }

  function updateExportButtons() {
    const has = slots.outer !== null || slots.inner !== null;
    document.getElementById('btn-svg').disabled = !has;
